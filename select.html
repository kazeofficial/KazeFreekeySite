<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAZEHAYAMODZ | KEY SYSTEM</title>
    
<style>
:root {
    --panel-width: 300px;
    --brand-top-space: 50px;
    --gap-between: 25px;
    --neon-blue: #4ccfff;
    --dark-bg: #05070a;
    --card-bg: #0d1117;
}

body {
    background: var(--dark-bg);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: var(--brand-top-space);
    min-height: 100vh;
    margin: 0;
    color: #e0e0e0;
    overflow-x: hidden;
}

/* Background Glow Effect */
body::before {
    content: "";
    position: fixed;
    top: 50%; left: 50%;
    width: 400px; height: 400px;
    background: rgba(76, 207, 255, 0.1);
    filter: blur(100px);
    transform: translate(-50%, -50%);
    z-index: -1;
}

/* BRAND BOX WITH SPINNING BORDER */
.brand-box {
    position: relative;
    width: var(--panel-width);
    padding: 2px;
    border-radius: 12px;
    overflow: hidden;
    background: #111;
    margin-bottom: var(--gap-between);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.brand-box::before {
    content: "";
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: conic-gradient(transparent, transparent, transparent, var(--neon-blue));
    animation: rotate 3s linear infinite;
}

.brand-inner {
    position: relative;
    z-index: 1;
    background: #0a0a0a;
    padding: 16px;
    border-radius: 11px;
    text-align: center;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2.5px;
    color: #fff;
    text-shadow: 0 0 10px var(--neon-blue);
}

/* MAIN CONTAINER */
.container {
    background: var(--card-bg);
    text-align: center;
    width: var(--panel-width);
    padding: 30px 20px;
    border-radius: 15px;
    border: 1px solid rgba(76, 207, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
}

/* TITLE */
h2 {
    margin: 0 0 20px;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--neon-blue);
    opacity: 0.8;
}

/* SYSTEM MESSAGES (New!) */
.sys-logs {
    font-size: 10px;
    color: #444;
    text-align: left;
    margin-bottom: 15px;
    font-family: 'Courier New', Courier, monospace;
    background: rgba(0,0,0,0.2);
    padding: 8px;
    border-radius: 5px;
}

.sys-logs span { color: var(--neon-blue); }

/* TUTORIAL SECTION */
.tuts {
    font-size: 10px;
    line-height: 1.8;
    margin-bottom: 25px;
    color: #888;
    padding: 15px;
    background: rgba(255,255,255,0.02);
    border-left: 3px solid var(--neon-blue);
    text-align: left;
    border-radius: 0 8px 8px 0;
}

/* ANIMATED ARROW */
.arrow-container {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
}

.arrow {
    font-size: 22px;
    cursor: pointer;
    width: 45px; height: 45px;
    border-radius: 50%;
    background: rgba(76,207,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--neon-blue);
    transition: 0.4s;
    border: 1px solid rgba(76, 207, 255, 0.3);
    animation: bounce 2s infinite;
}

.arrow:hover {
    background: var(--neon-blue);
    color: #000;
    box-shadow: 0 0 20px var(--neon-blue);
}

.arrow.active {
    transform: rotate(180deg);
    animation: none;
}

/* MENU BOX */
.menu {
    margin-top: 25px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease-out, opacity 0.5s ease;
    opacity: 0;
}

.menu.show {
    max-height: 500px;
    opacity: 1;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
    background: var(--neon-blue);
    border: none;
    color: #000;
    text-transform: uppercase;
    transition: 0.3s;
    display: block;
    box-sizing: border-box;
}

.btn:hover {
    box-shadow: 0 0 25px rgba(76, 207, 255, 0.6);
    transform: translateY(-2px);
}

.btn:active {
    transform: translateY(1px);
}

/* Footer Info */
.footer-note {
    margin-top: 20px;
    font-size: 9px;
    color: #444;
    letter-spacing: 1px;
}

/* ANIMATIONS */
@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
    40% {transform: translateY(-5px);}
    60% {transform: translateY(-3px);}
}
</style>
</head>

<body>

<div class="brand-box">
    <div class="brand-inner">PLEASE SELECT YOUR KEY TYPE</div>
</div>

<div class="container">
    <h2>SYSTEM DASHBOARD</h2>

    <div class="sys-logs">
        > Status: <span>Online</span><br>
        > Access: <span>Free Key</span><br>
        > Developer: <span>Kazehayamodz</span></span>
    </div>

    <div class="tuts">
        <b>GUIDE:</b><br>
        1. Tap the arrow to open options.<br>
        2. Choose between Injector or Script Key.<br>
        3. Complete the step to unlock.
    </div>

    <div class="arrow-container">
        <div class="arrow" id="arrow">⌄</div>
    </div>

    <div class="menu" id="menu">
        
        <button class="btn" onclick="window.open('https://rshrt.com/KazeFreeKeyInjector','_blank')">
            GET FREE KEY CODM INJECTOR
        </button>

        <button class="btn" onclick="window.open('https://rshrt.com/KazeFreeKeyScript','_blank')">
            GET FREE KEY CODM SCRIPT
        </button>

        <div class="footer-note">CONNECTION SECURED via KAZEHAYA CLOUD</div>
    </div>
</div>

<script>
const arrow = document.getElementById("arrow");
const menu = document.getElementById("menu");

arrow.onclick = function() {
    menu.classList.toggle("show");
    arrow.classList.toggle("active");
    
    if(menu.classList.contains("show")) {
        console.log("Panel Accessed: " + new Date().toLocaleTimeString());
    }
}
</script>

</body>
</html>
