<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KAZEHAYAMODZ FREE KEY GENERATOR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
}

body {
    height: 100dvh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #080b11;
    font-family: 'Rajdhani', sans-serif;
    color: white;
    overflow: hidden;
    position: relative;
}

/* Background Ambient Glow */
body::before {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(0, 255, 213, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
    top: 20%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: none;
}

/* Container Card with Glassmorphism */
.container {
    position: relative;
    width: 100%;
    max-width: 400px;
    height: 100dvh;
    background: rgba(15, 22, 36, 0.85);
    backdrop-filter: blur(12px);
    border-left: 1px solid rgba(255, 255, 255, 0.05);
    border-right: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px 24px;
    text-align: center;
    z-index: 1;
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
}

/* Top Neon Line */
.container::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff0055, #00ffd5, #7000ff);
    background-size: 200% 100%;
    animation: neonGlow 4s linear infinite;
    z-index: 10;
}

@keyframes neonGlow {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
}

/* ==============================
   HEADER STYLES
   ============================== */
header {
    margin-top: 10px;
}

.brand-box {
    position: relative;
    display: inline-block;
    padding: 16px 24px;
    background: rgba(10, 15, 26, 0.9);
    border-radius: 16px;
    border: 1px solid rgba(0, 255, 213, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(0, 255, 213, 0.05);
}

header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 19px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.35;
}

header p {
    color: #00ffd5;
    font-size: 12px;
    margin-top: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(0, 255, 213, 0.4);
}

/* ==============================
   BUTTONS GROUP
   ============================== */
.btn-group {
    width: 100%;
    margin: auto 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
}

.btn:active {
    transform: scale(0.96);
}

/* Key Button */
.key {
    background: linear-gradient(135deg, #00ffd5 0%, #00b894 100%);
    color: #080b11;
    box-shadow: 0 4px 20px rgba(0, 255, 213, 0.35);
}

.key:hover {
    box-shadow: 0 6px 25px rgba(0, 255, 213, 0.5);
}

/* Telegram Button */
.telegram {
    background: linear-gradient(135deg, #229ED9 0%, #0077b5 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(34, 158, 217, 0.3);
}

/* Tutorial Button */
.tutorial {
    background: rgba(255, 68, 68, 0.1);
    color: #ff5555;
    border: 1px solid rgba(255, 68, 68, 0.4);
    box-shadow: 0 4px 15px rgba(255, 68, 68, 0.15);
}

/* ==============================
   FOOTER STYLES
   ============================== */
footer {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.warning {
    font-size: 12px;
    color: #fbbf24;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
}

.owner {
    font-size: 13px;
    color: #94a3b8;
    font-weight: 700;
    cursor: pointer;
    transition: color 0.2s;
}

.owner:hover {
    color: #00ffd5;
}

/* VIP Button */
.vip-btn-small {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    margin-top: 6px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 800;
    border-radius: 20px;
    text-decoration: none;
    background: linear-gradient(135deg, #ffe259 0%, #ffa751 100%);
    color: #000;
    box-shadow: 0 0 15px rgba(255, 167, 81, 0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.2s, box-shadow 0.2s;
}

.vip-btn-small:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(255, 167, 81, 0.6);
}

/* ==============================
   MODAL / POPUP INFO
   ============================== */
.generator-info {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(16px);
    padding: 28px;
    border-radius: 24px;
    border: 1px solid rgba(0, 255, 213, 0.3);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(0, 255, 213, 0.1);
    z-index: 100;
    font-size: 15px;
    color: #cbd5e1;
    line-height: 1.6;
    width: 88%;
    max-width: 320px;
    display: none;
    text-align: center;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.generator-info.active {
    display: block;
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.close-info {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.4);
    border-radius: 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
}

.close-info:hover {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<div class="container">

    <header>
        <div class="brand-box">
            <h1>KAZEHAYAMODZ<br>SECURE KEY SYSTEM</h1>
        </div>
        <p>Official Free Key Generator</p>
    </header>

    <div class="btn-group">
        <a class="btn key" href="select.html">🔑 Get Free Key</a>
        <a class="btn telegram" href="https://t.me/KazeMainChannel">📢 Join Telegram</a>
        <a class="btn tutorial" href="https://t.me/KazeTutorial/33">🎥 Watch Tutorial</a>
    </div>
        
    <footer>
        <p class="warning">⚠️ Report any bugs to the developer</p>
        <span class="owner" id="open-info">Developer: @KAZEHAYAMODZ</span>
        <a class="vip-btn-small" href="https://t.me/KAZEHAYAMODZ" target="_blank">⭐ Buy VIP Key</a>
    </footer>

</div>

<div class="generator-info" id="info-box">
    Official free key generator.<br>
    Key duration: <b style="color:#00ffd5">12 hours</b>.<br><br>
    You can generate a new key once your current key expires.
    <button class="close-info" id="close-info">CLOSE</button>
</div>

<script>
// Anti-back logic
history.pushState(null, null, location.href);
window.onpopstate = function() { history.go(1); };

// Overlay logic
const openBtn = document.getElementById('open-info');
const closeBtn = document.getElementById('close-info');
const infoBox = document.getElementById('info-box');

openBtn.onclick = () => infoBox.classList.add('active');
closeBtn.onclick = () => infoBox.classList.remove('active');
</script>

</body>
</html>
